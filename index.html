<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Oslofjord — kto gdzie mieszka</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --brand-900: #014d49;
    --brand-700: #0c625c;
    --brand-500: #3e9f97;
    --brand-200: #d2eeeb;
    --brand-100: #f0fcfa;
    --text: #1e1f21;
    --muted: #6b6e76;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: Archivo, system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--text);
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100%; }

  header {
    background: linear-gradient(160deg, var(--brand-900), var(--brand-700));
    color: #fff;
    padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 12px;
    z-index: 1001;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  header h1 { margin: 0 0 8px; font-size: 17px; font-weight: 600; letter-spacing: .2px; }
  header h1 small { font-weight: 400; opacity: .75; font-size: 12px; margin-left: 6px; }

  .searchbox { position: relative; }
  .searchbox input {
    width: 100%;
    padding: 10px 38px 10px 38px;
    border: none; border-radius: 999px;
    font-size: 16px; font-family: inherit;
    background: rgba(255,255,255,.95);
    color: var(--text);
    outline: none;
  }
  .searchbox .icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--muted); pointer-events: none;
  }
  .searchbox .clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 26px; height: 26px; border: none; border-radius: 50%;
    background: #e3e4e6; color: var(--muted);
    font-size: 15px; line-height: 1; cursor: pointer; display: none;
  }

  #results {
    position: absolute; left: 12px; right: 12px;
    top: calc(env(safe-area-inset-top, 0px) + 104px);
    max-height: 45vh; overflow-y: auto;
    background: #fff; border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
    z-index: 1002; display: none;
  }
  #results.open { display: block; }
  .result {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid #f0f1f2;
  }
  .result:last-child { border-bottom: none; }
  .result:hover, .result:active { background: var(--brand-100); }
  .result .badge {
    flex-shrink: 0;
    min-width: 34px; height: 34px; padding: 0 6px;
    border-radius: 10px;
    background: var(--brand-900); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .result .info { min-width: 0; }
  .result .name { font-weight: 600; font-size: 15px; }
  .result .addr { font-size: 12.5px; color: var(--muted); }
  .result .name b { color: var(--brand-700); background: var(--brand-200); border-radius: 3px; }
  .noresults { padding: 16px; text-align: center; color: var(--muted); font-size: 14px; }

  #map { flex: 1; z-index: 1; }

  /* marker budynku */
  .bldg-icon {
    background: var(--brand-500);
    border: 2.5px solid #fff;
    border-radius: 50%;
    color: #fff; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.35);
    transition: transform .15s ease, background .15s ease;
  }
  .bldg-icon.active { background: #ed6362; transform: scale(1.25); z-index: 999; }
  .bldg-count {
    position: absolute; top: -7px; right: -7px;
    background: #fff; color: var(--brand-900);
    border: 1.5px solid var(--brand-500);
    border-radius: 999px; min-width: 17px; height: 17px; padding: 0 3px;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .leaflet-popup-content { margin: 12px 14px; font-family: inherit; }
  .popup-title { font-weight: 700; font-size: 15px; color: var(--brand-900); margin-bottom: 2px; }
  .popup-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .popup-list { max-height: 200px; overflow-y: auto; }
  .popup-row {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 14px;
    padding: 4px 0; font-size: 13.5px;
    border-bottom: 1px dashed #eee;
  }
  .popup-row .names div { padding: 1px 0; }
  .popup-row:last-child { border-bottom: none; }
  .popup-row .apt { color: var(--brand-700); font-weight: 700; font-variant-numeric: tabular-nums; }
  .popup-row.hl { background: var(--brand-100); border-radius: 6px; padding-left: 6px; padding-right: 6px; margin: 0 -6px; }
  .popup-empty { font-size: 13px; color: var(--muted); padding: 4px 0; }

  footer {
    position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
    left: 50%; transform: translateX(-50%);
    z-index: 1000;
    background: rgba(255,255,255,.9); backdrop-filter: blur(6px);
    border-radius: 999px; padding: 6px 14px;
    font-size: 12px; color: var(--muted);
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Oslofjord — domki <small>Oslofjordveien</small></h1>
    <div class="searchbox">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path>
      </svg>
      <input id="search" type="search" placeholder="Szukaj osoby… (np. Polok)" autocomplete="off">
      <button class="clear" id="clearBtn" aria-label="Wyczyść">✕</button>
    </div>
  </header>
  <div id="results"></div>
  <div id="map"></div>
  <footer id="stats"></footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  // ── dane: data.json (edytowane przez bota Telegram) ──
  // GitHub Pages trzyma pliki w CDN ~10 min; bierzemy świeży commit i raw po SHA (~1 min).
  const REPO = "lukaspoloki/oslofjord-domki";
  async function loadResidents() {
    try {
      const commits = await fetch(
        `https://api.github.com/repos/${REPO}/commits?path=data.json&per_page=1`,
        { cache: "no-store", headers: { Accept: "application/vnd.github+json" } },
      ).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
      const sha = commits[0]?.sha;
      if (!sha) throw new Error("brak commitów");
      return fetch(
        `https://raw.githubusercontent.com/${REPO}/${sha}/data.json`,
        { cache: "no-store" },
      ).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
    } catch {
      // lokalny podgląd / awaria API → plik z tego samego hosta
      return fetch("data.json", { cache: "no-store" })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
    }
  }
  let BUILDINGS, APARTMENTS;
  try {
    ({ buildings: BUILDINGS, apartments: APARTMENTS } = await loadResidents());
  } catch (e) {
    document.body.innerHTML =
      '<p style="font-family:sans-serif;padding:2rem;color:#b00">Nie można wczytać <b>data.json</b>.' +
      ' Otwórz stronę przez serwer HTTP (np. <code>python3 -m http.server</code>), nie przez file://</p>';
    throw e;
  }

  // ── pomocnicze ──
  const norm = s => s.normalize("NFD").replace(/[̀-ͯ]/g, "")
                     .replace(/ł/g, "l").replace(/Ł/g, "L").toLowerCase();

  // mieszkania pogrupowane wg budynku
  const byBuilding = {};
  APARTMENTS.forEach(a => {
    (byBuilding[a.building] = byBuilding[a.building] || []).push(a);
  });
  Object.values(byBuilding).forEach(list => list.sort((a, b) => a.apt.localeCompare(b.apt)));

  // płaska lista osób (do wyszukiwarki)
  const PEOPLE = APARTMENTS.flatMap(a =>
    a.residents.map(name => ({ name, b: a.building, apt: a.apt })));

  const peopleIn = b => (byBuilding[b] || []).reduce((n, a) => n + a.residents.length, 0);

  // ── mapa ──
  const map = L.map("map", { zoomControl: false });
  L.control.zoom({ position: "bottomright" }).addTo(map);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  const markers = {};
  const bounds = [];

  function popupHtml(b, highlightApt) {
    const list = byBuilding[b] || [];
    const rows = list.length
      ? list.map(a => {
          const hl = highlightApt && a.apt === highlightApt ? " hl" : "";
          const floor = a.apt.length === 3 ? ` · p. ${a.apt[0]}` : "";
          const names = a.residents.map(n => `<div>${n}</div>`).join("");
          return `<div class="popup-row${hl}"><span class="names">${names}</span><span class="apt">${a.apt}${floor}</span></div>`;
        }).join("")
      : `<div class="popup-empty">Brak zgłoszonych osób</div>`;
    return `<div class="popup-title">Oslofjordveien ${b}</div>
            <div class="popup-sub">${peopleIn(b)} os. w ${list.length} mieszk.</div>
            <div class="popup-list">${rows}</div>`;
  }

  Object.entries(BUILDINGS).forEach(([b, pos]) => {
    const count = peopleIn(b);
    const size = count ? 34 : 24;
    const icon = L.divIcon({
      className: "",
      iconSize: [size, size],
      iconAnchor: [size / 2, size / 2],
      html: `<div class="bldg-icon" id="bldg-${b}" style="width:${size}px;height:${size}px;${count ? "" : "opacity:.45"}">${b}${count ? `<span class="bldg-count">${count}</span>` : ""}</div>`
    });
    const m = L.marker([pos.lat, pos.lng], { icon, zIndexOffset: count ? 100 : 0 }).addTo(map);
    m.bindPopup(() => popupHtml(b, currentHighlight && currentHighlight.b === b ? currentHighlight.apt : null),
                { maxWidth: 280 });
    m.on("popupclose", () => setActive(null));
    markers[b] = m;
    bounds.push([pos.lat, pos.lng]);
  });
  map.fitBounds(bounds, { padding: [40, 40] });

  let currentHighlight = null;
  function setActive(b) {
    document.querySelectorAll(".bldg-icon.active").forEach(el => el.classList.remove("active"));
    if (b) {
      const el = document.getElementById("bldg-" + b);
      if (el) el.classList.add("active");
    } else {
      currentHighlight = null;
    }
  }

  function goTo(b, apt) {
    const pos = BUILDINGS[b];
    if (!pos) return;
    currentHighlight = apt ? { b, apt } : null;
    map.flyTo([pos.lat, pos.lng], 18, { duration: 0.8 });
    setActive(b);
    setTimeout(() => markers[b].openPopup(), 850);
  }

  // ── wyszukiwarka ──
  const input = document.getElementById("search");
  const resultsEl = document.getElementById("results");
  const clearBtn = document.getElementById("clearBtn");

  function render(q) {
    const nq = norm(q.trim());
    clearBtn.style.display = q ? "block" : "none";
    if (!nq) { resultsEl.classList.remove("open"); resultsEl.innerHTML = ""; return; }

    const hits = PEOPLE
      .filter(r => norm(r.name).includes(nq) || r.b === nq || r.apt.startsWith(nq))
      .sort((a, b) => a.name.localeCompare(b.name, "pl"))
      .slice(0, 30);

    resultsEl.innerHTML = hits.length
      ? hits.map((r, i) => {
          const idx = norm(r.name).indexOf(nq);
          const nameHtml = idx >= 0
            ? r.name.slice(0, idx) + "<b>" + r.name.slice(idx, idx + q.trim().length) + "</b>" + r.name.slice(idx + q.trim().length)
            : r.name;
          const flat = APARTMENTS.find(a => a.building === r.b && a.apt === r.apt);
          const others = flat.residents.filter(n => n !== r.name);
          const withWhom = others.length ? ` · z: ${others.join(", ")}` : "";
          return `<div class="result" data-i="${i}">
              <div class="badge">${r.b}</div>
              <div class="info">
                <div class="name">${nameHtml}</div>
                <div class="addr">Oslofjordveien ${r.b} · mieszkanie ${r.apt}${withWhom}</div>
              </div>
            </div>`;
        }).join("")
      : `<div class="noresults">Nie znaleziono „${q}”</div>`;
    resultsEl.classList.add("open");

    resultsEl.querySelectorAll(".result").forEach(el => {
      el.addEventListener("click", () => {
        const r = hits[+el.dataset.i];
        resultsEl.classList.remove("open");
        input.blur();
        goTo(r.b, r.apt);
      });
    });
  }

  input.addEventListener("input", () => render(input.value));
  input.addEventListener("focus", () => render(input.value));
  clearBtn.addEventListener("click", () => { input.value = ""; render(""); input.focus(); });
  map.on("click", () => resultsEl.classList.remove("open"));

  // ── statystyki ──
  const nBuildings = Object.keys(byBuilding).length;
  document.getElementById("stats").textContent =
    `${PEOPLE.length} osób · ${APARTMENTS.length} mieszkań · ${nBuildings} budynków`;
</script>
</body>
</html>
